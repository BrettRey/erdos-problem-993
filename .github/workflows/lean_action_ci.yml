name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: lean-action-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read # Read access to repository contents
  pages: write # Required only when docgen deploy is enabled
  id-token: write # Required only when docgen deploy is enabled

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
      - name: Build and deploy docs (optional)
        if: ${{ vars.ENABLE_LEAN_DOCGEN_PAGES == 'true' }}
        continue-on-error: true
        uses: leanprover-community/docgen-action@v1
